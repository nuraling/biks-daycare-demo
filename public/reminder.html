<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biks Agent - Reminder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #E5DDD5; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8bfb0' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); display: flex; justify-content: center; min-height: 100vh; }
    #app { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; background: white; }
    .header { background: #1B4332; height: 60px; padding: 0 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .header a { color: white; text-decoration: none; font-size: 20px; display: flex; align-items: center; margin-right: 4px; }
    .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: #2D6A4F; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
    .header-info { flex: 1; }
    .header-name { color: white; font-size: 15px; font-weight: 600; }
    .header-status { color: #a8d5b5; font-size: 12px; }
    .chat-area { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; }
    .bubble-wrap { display: flex; margin-bottom: 4px; }
    .bubble-wrap.agent { justify-content: flex-start; }
    .bubble { max-width: 80%; padding: 8px 12px; font-size: 14px; line-height: 1.5; position: relative; word-wrap: break-word; }
    .bubble.agent { background: #FFFFFF; border-radius: 0px 12px 12px 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .bubble.agent::before { content: ''; position: absolute; top: 0; left: -8px; border-width: 0 8px 8px 0; border-style: solid; border-color: transparent #FFFFFF transparent transparent; }
    .bubble-meta { font-size: 10px; color: #999; text-align: right; margin-top: 4px; }
    .typing-dots { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .typing-dots span { width: 8px; height: 8px; background: #aaa; border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    .scenario-bar { background: #F0F2F5; padding: 12px; flex-shrink: 0; }
    .scenario-bar p { font-size: 12px; color: #888; margin-bottom: 8px; text-align: center; }
    .scenario-grid { display: flex; flex-direction: column; gap: 8px; }
    .scenario-btn { border: none; padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 500; cursor: pointer; text-align: left; font-family: inherit; transition: transform 0.1s; }
    .scenario-btn:active { transform: scale(0.98); }
    .scenario-btn.parent { background: #E8F5E9; color: #1B5E20; }
    .scenario-btn.staff { background: #E3F2FD; color: #0D47A1; }
    .scenario-btn:disabled { opacity: 0.5; cursor: default; }
    .divider { text-align: center; padding: 8px 0; }
    .divider span { background: #E2D9CC; color: #555; font-size: 11px; padding: 4px 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <a href="/">&larr;</a>
      <div class="header-avatar">B</div>
      <div class="header-info">
        <div class="header-name">Biks Agent &ndash; Reminder Demo</div>
        <div class="header-status">Online</div>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="divider"><span>Simulasi Reminder</span></div>
    </div>

    <div class="scenario-bar">
      <p>Pilih skenario reminder untuk simulasi:</p>
      <div class="scenario-grid">
        <button class="scenario-btn parent" onclick="triggerReminder('pickup')">&#x23F0; Reminder Jemput Anak (ke Orang Tua)</button>
        <button class="scenario-btn parent" onclick="triggerReminder('daily_update')">&#x1F4CB; Update Harian Anak (ke Orang Tua)</button>
        <button class="scenario-btn parent" onclick="triggerReminder('payment')">&#x1F4B3; Reminder Pembayaran (ke Orang Tua)</button>
        <button class="scenario-btn staff" onclick="triggerReminder('report')">&#x1F514; Reminder Laporan Harian (ke Staff)</button>
        <button class="scenario-btn staff" onclick="triggerReminder('weekly')">&#x1F4CA; Rekap Mingguan (ke Staff)</button>
      </div>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chat-area');

    const REMINDERS = {
      pickup: {
        label: 'Reminder Jemput',
        target: 'Orang Tua',
        messages: [
          "Halo kak Sari! \u23F0",
          "Ini reminder dari daycare Kalideres.\n\nAnak kak, Aldi, dijemput jam 16:00 ya kak (30 menit lagi).\n\n\uD83D\uDCCD Lokasi: Daycare Biks Kalideres\n\uD83D\uDC76 Kondisi anak: Sehat, aktif bermain\n\nSampai ketemu nanti kak! \uD83D\uDE0A"
        ]
      },
      daily_update: {
        label: 'Update Harian',
        target: 'Orang Tua',
        messages: [
          "Halo kak Rina! \uD83D\uDC4B",
          "\uD83D\uDCCB Laporan Harian - Dina\n\uD83C\uDFEB Cabang: Kelapa Gading\n\uD83D\uDCC5 Kamis, 6 Maret 2026\n\n\uD83D\uDE00 Mood: Ceria\n\uD83C\uDF5A Makan siang: Habis\n\uD83D\uDCA4 Tidur siang: 12:30 - 14:00\n\uD83C\uDFA8 Aktivitas: Finger painting & bernyanyi\n\n\u2705 Kondisi sehat, tidak ada catatan khusus.\n\nAda yang mau ditanyakan kak? \uD83D\uDE0A"
        ]
      },
      payment: {
        label: 'Reminder Pembayaran',
        target: 'Orang Tua',
        messages: [
          "Halo kak Budi! \uD83D\uDE0A",
          "\uD83D\uDCB3 Reminder Pembayaran\n\nSPP daycare bulan Maret 2026 belum terbayar ya kak.\n\n\uD83D\uDCB0 Jumlah: Rp 2.500.000\n\uD83C\uDFEB Cabang: Cengkareng\n\uD83D\uDCC5 Jatuh tempo: 10 Maret 2026\n\nBisa transfer ke:\nBCA 123-456-789 a.n. PT Biks Daycare\n\nKalau sudah bayar, kirim bukti transfer ke sini ya kak. Terima kasih! \uD83D\uDE4F"
        ]
      },
      report: {
        label: 'Reminder Laporan',
        target: 'Staff Cabang',
        messages: [
          "Halo kak PIC Grogol Petamburan! \uD83D\uDCDD",
          "\uD83D\uDD14 Reminder: Laporan harian belum disubmit.\n\nSekarang sudah jam 16:00. Boleh segera kirim laporan hari ini ya kak?\n\nLangsung isi format berikut:\n1. Jumlah anak hadir:\n2. Jumlah anak izin:\n3. Kejadian penting:\n4. Catatan:\n\nTerima kasih kak! \u2705"
        ]
      },
      weekly: {
        label: 'Rekap Mingguan',
        target: 'Staff Cabang',
        messages: [
          "\uD83D\uDCCA Rekap Mingguan - Penjaringan\n\uD83D\uDCC5 3 - 7 Maret 2026",
          "\uD83D\uDC76 Rata-rata hadir: 22 anak/hari\n\uD83D\uDDD3 Izin minggu ini: 5 anak total\n\u26A0\uFE0F Kejadian: 1 (anak demam hari Selasa)\n\u2705 Laporan tersubmit: 5/5 hari\n\n\uD83C\uDF1F Performa cabang: Baik\n\nLanjutkan kerjanya kak! Semangat minggu depan \uD83D\uDCAA"
        ]
      }
    };

    function getTime() {
      const now = new Date();
      return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    }

    function addBubble(text) {
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap agent';
      const bubble = document.createElement('div');
      bubble.className = 'bubble agent';
      bubble.innerHTML = text.replace(/\n/g, '<br>');
      const meta = document.createElement('div');
      meta.className = 'bubble-meta';
      meta.textContent = getTime();
      bubble.appendChild(meta);
      wrap.appendChild(bubble);
      chatArea.appendChild(wrap);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addDivider(text) {
      const div = document.createElement('div');
      div.className = 'divider';
      div.innerHTML = '<span>' + text + '</span>';
      chatArea.appendChild(div);
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap agent';
      wrap.id = 'typing';
      const bubble = document.createElement('div');
      bubble.className = 'bubble agent';
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      wrap.appendChild(bubble);
      chatArea.appendChild(wrap);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function triggerReminder(type) {
      const reminder = REMINDERS[type];
      if (!reminder) return;

      // Disable all buttons during animation
      document.querySelectorAll('.scenario-btn').forEach(b => b.disabled = true);

      addDivider(reminder.label + ' \u2192 ' + reminder.target);

      for (const msg of reminder.messages) {
        showTyping();
        await new Promise(r => setTimeout(r, 1000 + Math.random() * 500));
        removeTyping();
        addBubble(msg);
      }

      // Re-enable buttons
      document.querySelectorAll('.scenario-btn').forEach(b => b.disabled = false);
    }
  </script>
</body>
</html>
